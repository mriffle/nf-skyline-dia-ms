name: Nextflow Stub Runs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

jobs:
  stub-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nextflow-version: ['24.10.5', '25.10.4', '26.04.0']
        config: [
          'test-diann.config',
          'test-cascadia.config',
          'test-encyclopedia-narrow-gpf.config',
          'test-encyclopedia-wide-only.config',
          'test-diann-pdc.config',
          'test-carafe-multi.config',
          'test-carafe-dzip.config',
          'test-skip-dia-search.config',
          'test-msconvert-only-pdc.config',
          'test-msconvert-only-local.config',
          'test-diann-multi-batch-metadata.config',
          'test-diann-pdc-batches.config',
          'test-diann-filename-glob.config'
        ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Run (nf ${{ matrix.nextflow-version }} / ${{ matrix.config }})
      env:
        NXF_VER: ${{ matrix.nextflow-version }}
      run: |
        echo "Installing Nextflow ${NXF_VER}:"
        curl -s https://get.nextflow.io | bash
        chmod +x nextflow
        echo "Running Nextflow stub with config: ${{ matrix.config }}"
        ./nextflow run . -stub-run -c test-resources/${{ matrix.config }} -c test-resources/ci.config
